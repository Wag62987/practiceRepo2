name: CI Pipeline

on:
  push:
    branches: [main]
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '17'

      - name: Install Dependencies
        run: npm install

      - name: Run Tests
        run: |
                if npm run | grep -q "test"; then
                  npm test -- --watch=false
                else
                  echo "No test script found, skipping tests"
                fi


      - name: Build App
        run: npm run build
      - name: Trigger Hosting Build
        if: success()
        run: curl -X POST https://api.netlify.com/build_hooks/69c2856644be77a6729694d8
